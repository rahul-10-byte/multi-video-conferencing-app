<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi Video Conferencing App</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="landingScreen" class="panel">
        <h1>Multi Video Conferencing App</h1>
        <label>Backend URL <input id="backendUrl" placeholder="auto: current origin" /></label>
        <label>Your Name <input id="participantId" value="rahul" /></label>
        <label>
          Role
          <select id="role">
            <option value="agent">agent</option>
            <option value="customer">customer</option>
          </select>
        </label>

        <div class="room-actions">
          <div class="action-box">
            <h2>Create Room</h2>
            <label>Room Name <input id="createRoomName" placeholder="team-sync" /></label>
            <button id="createRoomBtn">Create & Join</button>
          </div>
          <div class="action-box">
            <h2>Join Room</h2>
            <label>Room Name or ID <input id="joinRoomInput" placeholder="team-sync or vc_sess_..." /></label>
            <button id="joinRoomBtn">Join</button>
          </div>
        </div>
      </section>

      <section id="callScreen" class="hidden">
        <div class="topbar panel">
          <div>
            <strong>Room:</strong> <span id="activeRoomLabel">-</span>
            <span id="connectionState" class="conn-state">Disconnected</span>
          </div>
          <div class="controls">
            <button id="audioBtn" disabled>Mute Audio</button>
            <button id="videoBtn" disabled>Stop Video</button>
            <button id="leaveBtn" disabled>Leave</button>
          </div>
        </div>

        <section id="participantsGrid" class="participants-grid"></section>

        <section class="panel">
          <h2>Diagnostics</h2>
          <pre id="diagnostics">No diagnostics yet.</pre>
        </section>

        <section class="panel">
          <h2>Status</h2>
          <pre id="log"></pre>
        </section>
      </section>
    </main>

    <script type="module" src="./app.js?v=20260422-2"></script>
  </body>
</html>
