<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi Video Conferencing App</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="landingScreen" class="panel">
        <h1>Multi Video Conferencing App</h1>
        <div class="form-grid">
          <label>Backend URL <input id="backendUrl" placeholder="auto: current origin" /></label>
          <label>Your Name <input id="participantId" value="rahul" /></label>
          <label>
            Role
            <select id="role">
              <option value="agent">agent</option>
              <option value="customer">customer</option>
            </select>
          </label>
        </div>

        <section id="customerOtpPanel" class="panel hidden">
          <h2>Customer OTP Verification</h2>
          <div class="form-grid">
            <label>Session ID <input id="otpSessionId" placeholder="vc_sess_..." /></label>
            <label>Customer ID <input id="otpCustomerId" placeholder="customer-1" /></label>
            <label>OTP <input id="otpCode" placeholder="123456" /></label>
          </div>
          <button id="verifyOtpBtn">Verify OTP</button>
          <pre id="otpResult">Enter OTP details and verify.</pre>
        </section>

        <div id="roomActions" class="room-actions">
          <div id="createRoomBox" class="action-box">
            <h2>Create Room</h2>
            <label>Room Name <input id="createRoomName" placeholder="team-sync" /></label>
            <button id="createRoomBtn">Create & Join</button>
          </div>
          <div id="joinRoomBox" class="action-box">
            <h2>Join Room</h2>
            <label>Room Name or ID <input id="joinRoomInput" placeholder="team-sync or vc_sess_..." /></label>
            <button id="joinRoomBtn">Join</button>
          </div>
        </div>
      </section>

      <section id="callScreen" class="hidden">
        <div class="topbar panel">
          <div>
            <strong>Room:</strong> <span id="activeRoomLabel">-</span>
            <span id="connectionState" class="conn-state">Disconnected</span>
          </div>
          <div class="controls controls-wrap">
            <button id="audioBtn" disabled>Mute Audio</button>
            <button id="videoBtn" disabled>Stop Video</button>
            <button id="switchCameraBtn" disabled>Switch Camera</button>
            <button id="startRecordingBtn" disabled>Start Recording</button>
            <button id="stopRecordingBtn" disabled>Stop Recording</button>
            <button id="leaveBtn" disabled>Leave</button>
          </div>
        </div>

        <section class="panel">
          <h2>Customer Invite + OTP</h2>
          <div class="form-grid">
            <label>Customer ID <input id="inviteCustomerId" placeholder="customer-1" /></label>
            <label>Channel <input id="inviteChannel" value="link" placeholder="sms|email|link" /></label>
          </div>
          <button id="sendInviteBtn" disabled>Send Invite</button>
          <pre id="inviteResult">No invite sent yet.</pre>
        </section>

        <section class="panel">
          <h2>Disposition</h2>
          <div class="form-grid">
            <label>
              Outcome
              <select id="dispositionOutcome">
                <option value="resolved">resolved</option>
                <option value="follow_up">follow_up</option>
                <option value="dropped">dropped</option>
              </select>
            </label>
            <label>Notes <input id="dispositionNotes" placeholder="Call outcome details" /></label>
          </div>
          <button id="submitDispositionBtn" disabled>Submit Disposition</button>
        </section>

        <section id="participantsGrid" class="participants-grid"></section>

        <section class="panel">
          <h2>Chat</h2>
          <div class="chat-composer">
            <input id="chatInput" placeholder="Type message" />
            <button id="chatSendBtn" disabled>Send</button>
          </div>
          <pre id="chatLog">No messages yet.</pre>
        </section>

        <section class="panel">
          <h2>Diagnostics</h2>
          <pre id="diagnostics">No diagnostics yet.</pre>
        </section>

        <section class="panel">
          <h2>Status</h2>
          <pre id="log"></pre>
        </section>
      </section>
    </main>

    <script type="module" src="/app.js?v=20260424-1"></script>
  </body>
</html>
